<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<title>펀딩보드</title>
<link rel="icon" href="https://lh3.googleusercontent.com/d/1QJSXYieIldMTNwEnN03wlVfjR0cPlmUu" type="image/png">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jua','Nanum Gothic','Malgun Gothic',sans-serif;background:#64748b;display:flex;align-items:flex-start;justify-content:flex-start;padding:16px 0 0 16px;}
.app{display:flex;width:1280px;height:800px;overflow:hidden;flex-shrink:0;border-radius:16px;}

/* ── SIDEBAR 320px ── */
.sidebar{width:320px;min-width:320px;height:800px;background:#faf0f3;display:flex;flex-direction:column;overflow:hidden;}

.s-banner{height:62px;background:#ffb7cc;display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;}
.s-banner-img{width:44px;height:44px;background:transparent;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.s-banner-img img{width:100%;height:100%;object-fit:cover;}
.s-banner-text{font-size:22px;font-weight:800;color:#5c1a2e;}

.s-bgm{margin:8px 10px 0;background:#fff;border-radius:10px;padding:8px 12px;flex-shrink:0;}
.bgm-song{font-size:13px;color:#4a1a2a;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.bgm-controls{display:flex;align-items:center;gap:6px;}
.bgm-btn{background:#ffe4ed;border:none;border-radius:6px;cursor:pointer;font-size:14px;color:#4a1a2a;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.bgm-btn:hover{background:#ff8fab;color:#fff;}
.vol-slider{flex:1;height:4px;accent-color:#ff8fab;cursor:pointer;}

.s-menu{flex:1;overflow-y:visible;padding:4px 0;background:#faf0f3;}
.mi{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:19px;font-weight:700;color:#3d1a1a;cursor:pointer;transition:background 0.15s;}
.mi:hover{background:#ffe4ed;color:#c73065;}
.mi-icon{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.mi-icon svg{width:28px;height:28px;}

.s-banners{flex-shrink:0;padding:6px 10px;display:flex;flex-direction:column;gap:4px;background:#fff0f4;}
.s-bi{height:70px;border-radius:8px;overflow:hidden;cursor:pointer;position:relative;}
.s-bi:hover{opacity:0.88;}
.s-bi img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.s-bi-fb{width:100%;height:100%;background:#ffd6e4;display:flex;align-items:center;justify-content:center;font-size:18px;color:#e8447a;font-weight:700;}
.s-bi-logo{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* ── CONTENT 960px ── */
.content{flex:1;height:800px;background:#fff0f4;display:flex;flex-direction:column;overflow:hidden;}
.c-header{height:62px;background:#ff6b9d;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.c-title{font-size:28px;font-weight:800;color:#fff;letter-spacing:1px;}

.c-memo{margin:8px 10px 0;flex-shrink:0;display:flex;gap:8px;}
.c-memo-left{flex:1;}
.c-memo-left textarea{width:100%;height:130px;background:#fff;border-radius:8px;padding:9px 12px;font-size:17px;font-weight:700;color:#1e293b;resize:none;outline:none;font-family:inherit;line-height:1.75;border:none;overflow:hidden;}
.c-memo-left textarea::placeholder{color:#94a3b8;font-weight:400;}

.c-timer{width:380px;background:#fff;border-radius:8px;padding:10px;display:flex;flex-direction:column;height:130px;gap:6px;}
.timer-row1{display:grid;grid-template-columns:1fr auto auto 1fr auto auto 1fr;gap:6px;height:82px;align-items:end;}
.timer-num-wrap{background:#fffbeb;border-radius:8px;border:2px solid #fde68a;display:flex;align-items:center;justify-content:center;height:100%;}
.timer-num{font-size:52px;font-weight:800;color:#1e293b;font-family:monospace;line-height:1;}
.timer-label{font-size:14px;font-weight:700;color:#64748b;line-height:1;padding-bottom:2px;}
.timer-colon{font-size:48px;font-weight:800;color:#9f7a7a;line-height:1;align-self:stretch;display:flex;align-items:center;padding-bottom:20px;}
.timer-btns-col{display:flex;flex-direction:column;gap:6px;height:100%;align-self:stretch;}
.timer-top-btn{border-radius:6px;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;justify-content:center;flex:1;}
.timer-top-btn.start{background:#22c55e;}
.timer-top-btn.start:hover{background:#16a34a;}
.timer-top-btn.stop{background:#ef4444;}
.timer-top-btn.stop:hover{background:#dc2626;}
.timer-top-btn.reset{background:#64748b;}
.timer-top-btn.reset:hover{background:#475569;}
.timer-row2{display:grid;grid-template-columns:repeat(6, 1fr);gap:6px;}
.timer-btn{padding:8px 0;border-radius:6px;border:none;background:#a7f3d0;color:#065f46;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.timer-btn:hover{background:#6ee7b7;}
.timer-btn.minus{background:#f97316;color:#fff;}
.timer-btn.minus:hover{background:#ea580c;color:#fff;}

.c-tabs{display:flex;align-items:center;gap:8px;padding:7px 10px;flex-shrink:0;}
.tab-btn{display:flex;align-items:center;gap:6px;padding:7px 18px;border-radius:8px;border:none;background:#fff;font-size:19px;font-weight:700;color:#4a1a2a;cursor:pointer;transition:all 0.15s;}
.tab-btn:hover{background:#ffe4ed;}
.tab-btn.active{background:#ff8fab;color:#5c1a2e;}
.tab-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.tab-icon svg{width:22px;height:22px;}
.reset-btn{margin-left:auto;padding:7px 18px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
.reset-btn:hover{background:#b91c1c;}
.reset-btn svg{width:20px;height:20px;}

/* ── 개인 탭 ── */
.c-stat{margin:0 10px;background:#ff6b9d;border-radius:10px;display:flex;align-items:stretch;overflow:hidden;height:58px;flex-shrink:0;}
.stat-label{padding:0 16px;font-size:19px;font-weight:800;color:#fff;display:flex;align-items:center;background:#e8447a;white-space:nowrap;}
.stat-inner{display:flex;align-items:center;gap:10px;padding:0 14px;}
.stat-box{background:#fff;border-radius:8px;padding:5px 18px;display:flex;align-items:center;gap:8px;}
.stat-box-lbl{font-size:16px;font-weight:700;color:#4a1a2a;}
.stat-box-val{font-size:22px;font-weight:800;color:#1e293b;min-width:80px;text-align:center;}
.stat-team{display:flex;align-items:center;gap:6px;padding:0 12px;margin-left:auto;}
.stat-team-lbl{font-size:15px;font-weight:700;color:#fff;text-shadow:-1px -1px 0 #333,1px -1px 0 #333,-1px 1px 0 #333,1px 1px 0 #333;white-space:nowrap;}
.stat-team-inp{width:50px;text-align:center;border:none;border-radius:6px;padding:3px;font-size:19px;font-weight:800;color:#1e293b;background:#fff;outline:none;}
.team-btn{width:28px;height:28px;border-radius:50%;border:none;background:#fff;cursor:pointer;font-size:16px;font-weight:800;color:#4a1a2a;display:flex;align-items:center;justify-content:center;}
.team-btn:hover{background:#ff8fab;color:#fff;}

.c-boards{display:flex;flex:1;gap:8px;margin:8px 10px 10px;min-height:0;}
.board{flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:12px;background:#fff;min-height:0;}
.board-input{display:flex;align-items:center;gap:7px;padding:9px 10px;background:#ffccd8;flex-shrink:0;height:66px;border-radius:12px 12px 0 0;}
.b-fi{flex:1;padding:8px 12px;border:none;border-radius:8px;font-size:20px;font-weight:600;color:#1e293b;outline:none;background:#fff;height:48px;}
.b-fi::placeholder{color:#aaa;font-weight:400;}
.b-enter{width:48px;height:48px;border-radius:8px;border:none;background:#ff8fab;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.b-enter:hover{background:#ff6b9d;}
.b-enter svg{width:22px;height:22px;}
.board-list{flex:1;overflow-y:auto;padding:2px 0;}
.board-list::-webkit-scrollbar{width:4px;}
.board-list::-webkit-scrollbar-thumb{background:#ffb7cc;border-radius:3px;}
.b-row{display:flex;align-items:center;padding:6px 46px 6px 10px;border-bottom:1px solid #faf0f3;position:relative;gap:7px;min-height:43px;}
.b-row:hover{background:#fff4f7;}
.b-row.sd-row{background:#fff0f4;}
.b-row.ph-row{background:#fff;}
.rank-wrap{width:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.b-name{flex:1;color:#1e293b;font-weight:700;font-size:21px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.b-name:hover{color:#c73065;text-decoration:underline;}
.b-name.no-edit,.b-name.ph-name{cursor:default;}
.b-name.no-edit:hover,.b-name.ph-name:hover{color:#1e293b;text-decoration:none;}
.b-name.ph-name{color:#cbd5e1;}
.b-cnt{color:#1e293b;font-weight:800;font-size:21px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.b-cnt:hover{text-decoration:underline;}
.b-cnt.no-edit{cursor:default;}
.b-cnt.no-edit:hover{text-decoration:none;}
.b-cheer{color:#f97316;font-weight:700;font-size:19px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.b-cheer:hover{text-decoration:underline;}
.del-btn{opacity:0;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:20px;color:#ef4444;font-weight:700;line-height:1;transition:opacity 0.15s;}
.b-row:hover .del-btn{opacity:1;}
.edit-input{border:2px solid #ff6b9d;border-radius:6px;padding:3px 8px;font-size:19px;font-weight:600;outline:none;width:110px;color:#1e293b;}

/* ── 단체 탭 ── */
.g-stat{margin:0 10px;background:#ff6b9d;border-radius:10px;display:flex;align-items:stretch;overflow:hidden;height:58px;flex-shrink:0;}
.g-stat-label{padding:0 16px;font-size:19px;font-weight:800;color:#fff;display:flex;align-items:center;background:#e8447a;white-space:nowrap;}
.g-stat-val{display:flex;align-items:center;padding:0 14px;}
.g-stat-box{background:#fff;border-radius:8px;padding:5px 18px;display:flex;align-items:center;gap:8px;}
.g-stat-box-val{font-size:22px;font-weight:800;color:#1e293b;min-width:120px;text-align:center;}
.g-toggle-wrap{display:flex;align-items:center;gap:6px;padding:0 14px;margin-left:auto;}
.g-toggle-lbl{font-size:15px;font-weight:700;color:#ffc2d4;white-space:nowrap;}
.g-toggle{display:flex;gap:4px;}
.g-toggle-btn{padding:5px 14px;border-radius:6px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:#ff6b9d;color:#fff4f7;transition:all 0.15s;}
.g-toggle-btn.active{background:#fff;color:#c73065;}
.g-boards{display:flex;flex:1;gap:8px;margin:8px 10px 10px;min-height:0;}
.g-board{flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:12px;background:#fff;min-height:0;}
.g-board-input{display:flex;align-items:center;gap:7px;padding:9px 10px;background:#ffccd8;flex-shrink:0;height:66px;border-radius:12px 12px 0 0;}
.g-list{flex:1;overflow-y:auto;padding:2px 0;}
.g-list::-webkit-scrollbar{width:4px;}
.g-list::-webkit-scrollbar-thumb{background:#ffb7cc;border-radius:3px;}
.g-row{display:flex;align-items:center;padding:6px 46px 6px 10px;border-bottom:1px solid #faf0f3;position:relative;gap:7px;min-height:43px;}
.g-row:hover{background:#fff4f7;}
.g-row.ph-row{background:#fff;}
.g-rank{width:36px;text-align:center;font-size:16px;font-weight:700;color:#64748b;flex-shrink:0;}
.g-name{flex:1;color:#1e293b;font-weight:700;font-size:20px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.g-name:hover{color:#c73065;text-decoration:underline;}
.g-name.ph-name{color:#cbd5e1;cursor:default;}
.g-name.ph-name:hover{color:#cbd5e1;text-decoration:none;}
.g-cnt{color:#1e293b;font-weight:800;font-size:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-right:40px;}
.g-cnt:hover{text-decoration:underline;}
.g-title{flex:1;color:#f97316;font-weight:600;font-size:17px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:60px;margin-left:16px;}
.g-title:hover{text-decoration:underline;}
.g-title.ph-title{color:#fff0f4;cursor:pointer;}
.g-del{opacity:0;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:19px;color:#ef4444;font-weight:700;line-height:1;transition:opacity 0.15s;}
.g-row:hover .g-del{opacity:1;}
.obs-bar{display:flex;align-items:center;padding:4px 10px;background:#fff0f4;font-size:14px;color:#64748b;font-weight:600;gap:8px;}
.obs-line{flex:1;height:1px;background:#94a3b8;}
</style>
</head>
<body>
<div class="app">

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="s-banner">
    <div class="s-banner-img">
      <img src="https://lh3.googleusercontent.com/d/1INQqvt6z3mMpUjJh1Y431s6Am_HahUM_" alt="배너" onerror="this.style.display='none';this.parentElement.textContent='🎮'">
    </div>
    <div class="s-banner-text">Beluga 이유란</div>
  </div>

  <div class="s-bgm">
    <div class="bgm-song">Blank - Disfigure</div>
    <div class="bgm-controls">
      <button class="bgm-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="bgm-btn" onclick="stopBgm()">⏹</button>
      <button class="bgm-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="50" value="10" oninput="setVolume(this.value)">
    </div>
  </div>
  <audio id="bgmAudio" preload="auto" crossorigin="anonymous">
    <source src="https://archive.org/download/DisfigureBlankNCSRelease/Disfigure%20-%20Blank%20%5BNCS%20Release%5D.mp3" type="audio/mpeg">

    </div>
    <div class="mi" onclick="openRoulette()">
      <div class="mi-icon"><svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="13" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/><path d="M15 2L15 15L23 9Z" fill="#dc2626"/><path d="M15 15L23 9L28 15Z" fill="#f97316"/><path d="M15 15L28 15L23 21Z" fill="#facc15"/><path d="M15 15L23 21L15 28Z" fill="#4ade80"/><path d="M15 15L15 28L7 21Z" fill="#22d3ee"/><path d="M15 15L7 21L2 15Z" fill="#818cf8"/><path d="M15 15L2 15L7 9Z" fill="#ffb7cc"/><path d="M15 15L7 9L15 2Z" fill="#ff8fab"/><circle cx="15" cy="15" r="4" fill="#fff" stroke="#fff0f4"/><circle cx="15" cy="15" r="2" fill="#334155"/><polygon points="15,0 13.5,4 16.5,4" fill="#dc2626"/></svg></div>룰렛
    </div>
    <div class="mi" onclick="openLink('https://lazygyu.github.io/roulette/')">
      <div class="mi-icon"><svg viewBox="0 0 30 30" fill="none"><rect x="4" y="1" width="22" height="26" rx="4" fill="#1e293b"/><rect x="4" y="1" width="22" height="7" rx="4" fill="#dc2626"/><line x1="10" y1="8" x2="10" y2="25" stroke="#334155" stroke-width="1.2"/><line x1="15" y1="8" x2="15" y2="25" stroke="#334155" stroke-width="1.2"/><line x1="20" y1="8" x2="20" y2="25" stroke="#334155" stroke-width="1.2"/><circle cx="12" cy="14" r="3" fill="#facc15"/><circle cx="18" cy="19" r="3" fill="#f97316"/><circle cx="12" cy="24" r="2" fill="#4ade80"/><rect x="7" y="27" width="16" height="4" rx="2" fill="#475569"/></svg></div>핀볼
    </div>
    <div class="mi" onclick="openLink('https://opcysss.github.io/RandomSeqGenerator/main')">
      <div class="mi-icon"><svg viewBox="0 0 30 30" fill="none"><rect x="1" y="16" width="18" height="10" rx="5" fill="#374151"/><rect x="15" y="18" width="12" height="6" rx="3" fill="#4b5563"/><circle cx="6" cy="28" r="4" fill="#1e293b" stroke="#6b7280" stroke-width="1.2"/><circle cx="17" cy="28" r="4" fill="#1e293b" stroke="#6b7280" stroke-width="1.2"/><circle cx="26" cy="5" r="5" fill="#dc2626"/><circle cx="26" cy="5" r="2.5" fill="#fca5a5"/><line x1="24" y1="9" x2="20" y2="16" stroke="#f97316" stroke-width="1.8" stroke-dasharray="2,2" stroke-linecap="round"/></svg></div>대포

    <div class="mi" onclick="openDopamine('ladder')">

    </div>
    <div class="mi" onclick="openDopamine('ball')">
      <div class="mi-icon"><svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="12" fill="#ff8fab" stroke="#ffb7cc" stroke-width="1.5"/><circle cx="15" cy="15" r="8" fill="#fff" stroke="#ffd6e4" stroke-width="1"/><circle cx="11" cy="12" r="2.5" fill="#dc2626"/><circle cx="19" cy="12" r="2.5" fill="#4ade80"/><circle cx="15" cy="19" r="2.5" fill="#facc15"/><circle cx="11" cy="12" r="1" fill="#fff" opacity="0.7"/><circle cx="19" cy="12" r="1" fill="#fff" opacity="0.7"/><circle cx="15" cy="19" r="1" fill="#fff" opacity="0.7"/><rect x="13" y="25" width="4" height="3" rx="1" fill="#ff6b9d"/></svg></div>공뽑기
    </div>
    <div class="mi" onclick="openDopamine('slot')">
      <div class="mi-icon"><svg viewBox="0 0 30 30" fill="none"><rect x="2" y="5" width="26" height="20" rx="4" fill="#e8447a"/><rect x="2" y="5" width="26" height="7" rx="4" fill="#e8447a"/><rect x="5" y="9" width="6" height="9" rx="2" fill="#1e293b"/><rect x="12" y="9" width="6" height="9" rx="2" fill="#1e293b"/><rect x="19" y="9" width="6" height="9" rx="2" fill="#1e293b"/><text x="6" y="17" font-size="6" fill="#facc15" font-weight="800">7</text><text x="13" y="17" font-size="6" fill="#f97316" font-weight="800">7</text><text x="20" y="17" font-size="6" fill="#facc15" font-weight="800">7</text><rect x="11" y="22" width="8" height="3" rx="1.5" fill="#ff8fab"/></svg></div>슬롯머신

<script>
var leftData=[],rightData=[],sdTotal=0,orderL=0,orderR=0;
var gData=[],gOrderN=0,gCalcMode='du';
var bgmMuted=false;

/* ── 아이콘 ── */
var RANK_EM=['🥇','🥈','🥉'];
function rankIcon(i){ if(i<3)return'<span style="font-size:24px;line-height:1;">'+RANK_EM[i]+'</span>';return'<span style="font-size:16px;font-weight:800;color:#64748b;">'+(i+1)+'등</span>';}
function cheerIcon(){return'<span style="font-size:22px;line-height:1;">👍</span>';}
function diamondIcon(){return'<span style="font-size:24px;line-height:1;">💎</span>';}
var G_RANK=['🥇','🥈','🥉'];
function gRankIcon(i){if(i<3)return'<span style="font-size:20px;line-height:1;">'+G_RANK[i]+'</span>';return'<span style="font-size:15px;font-weight:800;color:#64748b;">'+(i+1)+'</span>';}

/* ── 경고음 ── */
function beep(){try{var ac=new(window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.35);o.start();o.stop(ac.currentTime+0.35);}catch(e){}}

/* ── BGM ── */
function togglePlay(){var a=document.getElementById('bgmAudio');if(a.paused){a.play().then(function(){document.getElementById('playBtn').textContent='⏸';}).catch(function(){});}else{a.pause();document.getElementById('playBtn').textContent='▶';}}
function stopBgm(){var a=document.getElementById('bgmAudio');a.pause();a.currentTime=0;document.getElementById('playBtn').textContent='▶';}
function toggleMute(){var a=document.getElementById('bgmAudio');bgmMuted=!bgmMuted;a.muted=bgmMuted;document.getElementById('muteBtn').textContent=bgmMuted?'🔇':'🔊';if(!bgmMuted)document.getElementById('volSlider').value=Math.round(a.volume*100);}
function setVolume(v){var a=document.getElementById('bgmAudio');var vol=parseInt(v)/100;a.volume=vol;a.muted=(vol===0);bgmMuted=(vol===0);document.getElementById('muteBtn').textContent=(vol===0)?'🔇':'🔊';}

/* ── 탭 ── */
function setTab(t){['ind','grp'].forEach(function(id){document.getElementById('tab-'+id).classList.toggle('active',id===t);document.getElementById(id+'-content').style.display=(id===t)?'flex':'none';});if(t==='grp')renderGroup();}

/* ── 개인: 통계 ── */
function changeTeam(d){var el=document.getElementById('teamCount');el.value=Math.min(10,Math.max(1,(parseInt(el.value)||5)+d));updateStats();}
function getTotal(){return leftData.reduce(function(s,r){return s+r.cnt;},0)+sdTotal;}
function updateStats(){var tot=getTotal(),team=parseInt(document.getElementById('teamCount').value)||5;document.getElementById('statTotal').textContent=tot.toLocaleString()+'개';document.getElementById('statPer').textContent=(team>0?Math.floor(tot/team):0).toLocaleString()+'개';}

/* ── 파싱 ── */
function parseInput(val){val=val.trim();var m=val.match(/^(.+?)\s+(\d+)$/);if(m&&m[1].trim()){var c=parseInt(m[2]);if(c>0)return{name:m[1].trim(),cnt:c};}return null;}

/* ── 렌더: 좌측(펀딩) ── */
function renderLeft(){
  var sorted=leftData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  var html='';
  if(sdTotal>0){html+='<div class="b-row sd-row"><div class="rank-wrap">'+diamondIcon()+'</div><span class="b-name no-edit">YR 누님</span><span class="b-cnt no-edit" style="margin-left:auto">'+sdTotal.toLocaleString()+'개</span></div>';}
  sorted.forEach(function(r,i){html+='<div class="b-row" onmouseenter="this.querySelector(\'.del-btn\').style.opacity=1" onmouseleave="this.querySelector(\'.del-btn\').style.opacity=0"><div class="rank-wrap">'+rankIcon(i)+'</div><span class="b-name" onclick="editLName(this,'+r.order+')">'+r.name+'</span><span class="b-cnt" onclick="editLCnt(this,'+r.order+')" style="margin-left:auto">'+r.cnt.toLocaleString()+'개</span><button class="del-btn" onclick="delLeft('+r.order+')">✕</button></div>';});
  for(var i=sorted.length;i<3;i++){html+='<div class="b-row ph-row"><div class="rank-wrap">'+rankIcon(i)+'</div><span class="b-name ph-name">—</span></div>';}
  document.getElementById('leftList').innerHTML=html;
}

/* ── 렌더: 우측(응원) ── */
function renderRight(){
  var sorted=rightData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  var html='';
  sorted.forEach(function(r){html+='<div class="b-row" onmouseenter="this.querySelector(\'.del-btn\').style.opacity=1" onmouseleave="this.querySelector(\'.del-btn\').style.opacity=0"><div class="rank-wrap">'+cheerIcon()+'</div><span class="b-name" onclick="editRName(this,'+r.order+')">'+r.name+'</span><span class="b-cheer" onclick="editCheer(this,'+r.order+')" style="margin-left:auto">응원</span><button class="del-btn" onclick="delRight('+r.order+')">✕</button></div>';});
  if(!sorted.length){html+='<div class="b-row ph-row"><div class="rank-wrap">'+cheerIcon()+'</div><span class="b-name ph-name">—</span></div>';}
  document.getElementById('rightList').innerHTML=html;
}

/* ── 개인: 추가/삭제 ── */
function addLeft(){var raw=document.getElementById('leftIn').value;var p=parseInput(raw);if(!p){beep();return;}var ex=null;for(var i=0;i<leftData.length;i++){if(leftData[i].name===p.name){ex=leftData[i];break;}}if(ex)ex.cnt+=p.cnt;else leftData.push({name:p.name,cnt:p.cnt,order:orderL++});document.getElementById('leftIn').value='';renderLeft();updateStats();}
function addRight(){var raw=document.getElementById('rightIn').value;var p=parseInput(raw);if(!p){beep();return;}sdTotal+=p.cnt;var ex=null;for(var i=0;i<rightData.length;i++){if(rightData[i].name===p.name){ex=rightData[i];break;}}if(ex)ex.cnt+=p.cnt;else rightData.push({name:p.name,cnt:p.cnt,order:orderR++});document.getElementById('rightIn').value='';renderRight();renderLeft();updateStats();}
function delLeft(o){for(var i=0;i<leftData.length;i++){if(leftData[i].order===o){leftData.splice(i,1);break;}}renderLeft();updateStats();}
function delRight(o){for(var i=0;i<rightData.length;i++){if(rightData[i].order===o){sdTotal-=rightData[i].cnt;if(sdTotal<0)sdTotal=0;rightData.splice(i,1);break;}}renderRight();renderLeft();updateStats();}

/* ── 개인: 편집 ── */
function editLName(el,order){if(el.classList.contains('no-edit')||el.classList.contains('ph-name'))return;var cur=el.textContent;var inp=document.createElement('input');inp.className='edit-input';inp.value=cur;inp.style.width='140px';el.replaceWith(inp);inp.focus();inp.select();function save(){var v=inp.value.trim()||cur;for(var i=0;i<leftData.length;i++){if(leftData[i].order===order){leftData[i].name=v;break;}}renderLeft();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});}
function editLCnt(el,order){var r=null;for(var i=0;i<leftData.length;i++){if(leftData[i].order===order){r=leftData[i];break;}}if(!r)return;var inp=document.createElement('input');inp.className='edit-input';inp.type='number';inp.value=r.cnt;el.replaceWith(inp);inp.focus();inp.select();function save(){var v=parseInt(inp.value);if(!isNaN(v)&&v>=0)r.cnt=v;renderLeft();updateStats();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});}
function editRName(el,order){var cur=el.textContent;var inp=document.createElement('input');inp.className='edit-input';inp.value=cur;inp.style.width='140px';el.replaceWith(inp);inp.focus();inp.select();function save(){var v=inp.value.trim()||cur;for(var i=0;i<rightData.length;i++){if(rightData[i].order===order){rightData[i].name=v;break;}}renderRight();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});}
function editCheer(el,order){var r=null;for(var i=0;i<rightData.length;i++){if(rightData[i].order===order){r=rightData[i];break;}}if(!r)return;var inp=document.createElement('input');inp.className='edit-input';inp.type='number';inp.value=r.cnt;el.replaceWith(inp);inp.focus();inp.select();function save(){var v=parseInt(inp.value);if(!isNaN(v)&&v>=0){sdTotal+=v-r.cnt;if(sdTotal<0)sdTotal=0;r.cnt=v;}renderRight();renderLeft();updateStats();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});}

/* ── 단체 ── */
function setGCalc(mode){gCalcMode=mode;document.getElementById('gToggleDu').classList.toggle('active',mode==='du');document.getElementById('gToggleTotal').classList.toggle('active',mode==='total');updateGStat();}
function getGTotal(){return gData.reduce(function(s,r){return s+r.cnt;},0);}
function updateGStat(){
  var tot=getGTotal(),val;
  if(gCalcMode==='du'){
    val='두 '+tot.toLocaleString()+'개';
    document.getElementById('gStatBox').style.background='#dcfce7';
  } else {
    val='총 '+tot.toLocaleString()+'개';
    document.getElementById('gStatBox').style.background='#fee2e2';
  }
  document.getElementById('gStatVal').textContent=val;
}
function renderGroup(){
  var sorted=gData.slice().sort(function(a,b){return b.cnt!==a.cnt?b.cnt-a.cnt:a.order-b.order;});
  var html='',obsShown=false;
  sorted.forEach(function(r,i){
    if(i===4&&!obsShown){html+='<div class="obs-bar"><div class="obs-line"></div><span>옵저버</span><div class="obs-line"></div></div>';obsShown=true;}
    var titleHtml=r.title?('<span class="g-title" onclick="editGTitle(this,'+r.order+')">'+r.title+'</span>'):('<span class="g-title ph-title" onclick="editGTitle(this,'+r.order+')">&nbsp;</span>');
    html+='<div class="g-row" onmouseenter="this.querySelector(\'.g-del\').style.opacity=1" onmouseleave="this.querySelector(\'.g-del\').style.opacity=0">'
      +'<div class="g-rank">'+gRankIcon(i)+'</div>'
      +'<span class="g-name" onclick="editGName(this,'+r.order+')">'+r.name+'</span>'
      +'<span class="g-cnt" onclick="editGCnt(this,'+r.order+')">'+r.cnt.toLocaleString()+'개</span>'
      +titleHtml
      +'<button class="g-del" onclick="delGroup('+r.order+')">✕</button>'
      +'</div>';
  });
  var ph=['🥇','🥈','🥉','4'];
  for(var i=sorted.length;i<4;i++){html+='<div class="g-row ph-row"><div class="g-rank" style="font-size:'+(i<3?'20px':'16px')+';">'+ph[i]+'</div><span class="g-name ph-name">—</span></div>';}
  document.getElementById('gList').innerHTML=html;
  updateGStat();
}
function addGroup(){var raw=document.getElementById('gIn').value;var p=parseInput(raw);if(!p){beep();return;}var ex=null;for(var i=0;i<gData.length;i++){if(gData[i].name===p.name){ex=gData[i];break;}}if(ex)ex.cnt+=p.cnt;else gData.push({name:p.name,cnt:p.cnt,order:gOrderN++,title:''});document.getElementById('gIn').value='';renderGroup();}
function delGroup(o){for(var i=0;i<gData.length;i++){if(gData[i].order===o){gData.splice(i,1);break;}}renderGroup();}
function editGName(el,order){if(el.classList.contains('ph-name'))return;var cur=el.textContent;var inp=document.createElement('input');inp.className='edit-input';inp.value=cur;inp.style.width='130px';el.replaceWith(inp);inp.focus();inp.select();function save(){var v=inp.value.trim()||cur;for(var i=0;i<gData.length;i++){if(gData[i].order===order){gData[i].name=v;break;}}renderGroup();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});}
function editGCnt(el,order){var r=null;for(var i=0;i<gData.length;i++){if(gData[i].order===order){r=gData[i];break;}}if(!r)return;var inp=document.createElement('input');inp.className='edit-input';inp.type='number';inp.value=r.cnt;el.replaceWith(inp);inp.focus();inp.select();function save(){var v=parseInt(inp.value);if(!isNaN(v)&&v>=0)r.cnt=v;renderGroup();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});}
function editGTitle(el,order){var r=null;for(var i=0;i<gData.length;i++){if(gData[i].order===order){r=gData[i];break;}}if(!r)return;var cur=r.title||'';var inp=document.createElement('input');inp.className='edit-input';inp.value=cur;inp.style.width='130px';inp.placeholder='칭호 입력';el.replaceWith(inp);inp.focus();inp.select();function save(){r.title=inp.value.trim();renderGroup();}inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});}

/* ── 초기화 ── */
function resetAll(){if(!confirm('모든 펀딩 정보를 초기화할까요?'))return;leftData=[];rightData=[];sdTotal=0;orderL=0;orderR=0;gData=[];gOrderN=0;document.getElementById('memo').value='';document.getElementById('teamCount').value=5;renderLeft();renderRight();updateStats();renderGroup();}
function openLink(u){
  if(!u) return;
  var a=document.createElement('a');
  a.href=u; a.target='_blank'; a.rel='noopener noreferrer';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
var _dopamineWin=null;
function openDopamine(tab){
  var url='dopamine.html#'+tab;
  if(_dopamineWin&&!_dopamineWin.closed){
    _dopamineWin.focus();
    _dopamineWin.postMessage({type:'switchTab',tab:tab},'*');
  } else {
    var a=document.createElement('a');
    a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    _dopamineWin=null;
  }
}
function openRoulette(){openDopamine('roulette');}

document.addEventListener('DOMContentLoaded',function(){
  var a=document.getElementById('bgmAudio');
  a.volume=0.1;
  a.addEventListener('ended',function(){document.getElementById('playBtn').textContent='▶';});
  document.getElementById('memo').addEventListener('keydown',function(e){if(e.key==='Enter'&&this.value.split('\n').length>=4)e.preventDefault();});
  renderLeft();renderRight();updateStats();renderGroup();
});

// ========== 타이머 기능 ==========
var timerState = {
  totalSeconds: 0,
  running: false,
  interval: null
};

function updateTimerDisplay() {
  var min = Math.floor(timerState.totalSeconds / 60);
  var sec = timerState.totalSeconds % 60;
  document.getElementById('timerMin').textContent = String(min).padStart(2, '0');
  document.getElementById('timerSec').textContent = String(sec).padStart(2, '0');
}

function adjustTimer(seconds) {
  if (timerState.running) return;
  timerState.totalSeconds = Math.max(0, timerState.totalSeconds + seconds);
  updateTimerDisplay();
}

function startTimer() {
  if (timerState.totalSeconds === 0) return;
  
  if (timerState.running) {
    // 일시정지
    timerState.running = false;
    clearInterval(timerState.interval);
    document.getElementById('timerStartBtn').textContent = '시작';
    document.getElementById('timerStartBtn').className = 'timer-top-btn start';
  } else {
    // 시작
    timerState.running = true;
    document.getElementById('timerStartBtn').textContent = '정지';
    document.getElementById('timerStartBtn').className = 'timer-top-btn stop';
    
    timerState.interval = setInterval(function() {
      if (timerState.totalSeconds > 0) {
        timerState.totalSeconds--;
        updateTimerDisplay();
      } else {
        // 타이머 종료
        timerState.running = false;
        clearInterval(timerState.interval);
        document.getElementById('timerStartBtn').textContent = '시작';
        document.getElementById('timerStartBtn').className = 'timer-top-btn start';
        
        // 알람 소리 (beep)
        beep();
      }
    }, 1000);
  }
}

function resetTimer() {
  timerState.running = false;
  timerState.totalSeconds = 0;
  clearInterval(timerState.interval);
  document.getElementById('timerStartBtn').textContent = '시작';
  document.getElementById('timerStartBtn').className = 'timer-top-btn start';
  updateTimerDisplay();
}
